[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to Railway backend (avoids CORS)
[[redirects]]
  from   = "/api/*"
  to     = "https://ic-booklet-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# Proxy storage/asset files from Railway
[[redirects]]
  from   = "/storage/*"
  to     = "https://ic-booklet-production.up.railway.app/storage/:splat"
  status = 200
  force  = true

# SPA fallback — required for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
